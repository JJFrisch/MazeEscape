# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Restore dependencies
      run: |
        dotnet restore MazeEscape.Core/MazeEscape.Core.csproj
        dotnet restore MazeEscape.Api/MazeEscape.Api.csproj
        dotnet restore MazeEscape.Api.Tests/MazeEscape.Api.Tests.csproj
        dotnet restore MazeEscape.Web/MazeEscape.Web.csproj
        dotnet restore MazeEscape.Web.Tests/MazeEscape.Web.Tests.csproj
    - name: Build
      run: |
        dotnet build MazeEscape.Core/MazeEscape.Core.csproj --no-restore --configuration Release
        dotnet build MazeEscape.Api/MazeEscape.Api.csproj --no-restore --configuration Release
        dotnet build MazeEscape.Api.Tests/MazeEscape.Api.Tests.csproj --no-restore --configuration Release
        dotnet build MazeEscape.Web/MazeEscape.Web.csproj --no-restore --configuration Release
        dotnet build MazeEscape.Web.Tests/MazeEscape.Web.Tests.csproj --no-restore --configuration Release
    - name: Test
      run: |
        dotnet test MazeEscape.Api.Tests/MazeEscape.Api.Tests.csproj --no-build --configuration Release --verbosity normal
        dotnet test MazeEscape.Web.Tests/MazeEscape.Web.Tests.csproj --no-build --configuration Release --verbosity normal
