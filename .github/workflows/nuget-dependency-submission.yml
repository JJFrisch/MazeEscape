name: NuGet Dependency Submission

on:
  push:
    branches: ["master"]

jobs:
  nuget-dependency-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      # Only restore server-side projects — the MAUI app requires platform
      # workloads that aren't available on ubuntu-latest runners.
      - name: Restore server-side projects
        run: |
          dotnet restore MazeEscape.Core/MazeEscape.Core.csproj
          dotnet restore MazeEscape.Api/MazeEscape.Api.csproj
          dotnet restore MazeEscape.Api.Tests/MazeEscape.Api.Tests.csproj
          dotnet restore MazeEscape.Web/MazeEscape.Web.csproj
          dotnet restore MazeEscape.Web.Tests/MazeEscape.Web.Tests.csproj

      - uses: advanced-security/nuget-dependency-submission-action@v1
        with:
          solution-path: |
            MazeEscape.Core/MazeEscape.Core.csproj
            MazeEscape.Api/MazeEscape.Api.csproj
            MazeEscape.Api.Tests/MazeEscape.Api.Tests.csproj
            MazeEscape.Web/MazeEscape.Web.csproj
            MazeEscape.Web.Tests/MazeEscape.Web.Tests.csproj
